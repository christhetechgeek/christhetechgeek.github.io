<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TriG201 | The Neon-Noir Universe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="hero-entrance" class="section">
        <h1>TriG201</h1>
        <button id="start-journey">ENTER THE WASTELAND</button>
    </section>
    
    <main id="wasteland-stage">
        <div id="character-split">
            <div id="aero-side" class="side" onclick="playCurrentTrack('aero')"><div class="glyph">X</div></div>
            <div id="onyx-side" class="side" onclick="playCurrentTrack('onyx')"><div class="glyph">🌸</div></div>
        </div>

        <div class="cinematic-gallery">
            <img src="/img/img1.png" class="gallery-item" alt="Visual Asset">
            <img src="/img/img2.png" class="gallery-item" alt="Visual Asset">
            <img src="/img/img3.png" class="gallery-item" alt="Visual Asset">
            <img src="/img/img4.png" class="gallery-item" alt="Visual Asset">
            <img src="/img/img5.png" class="gallery-item" alt="Visual Asset">
            <img src="/img/img6.png" class="gallery-item" alt="Visual Asset">
            <img src="/img/img7.png" class="gallery-item" alt="Visual Asset">
            <img src="/img/img8.png" class="gallery-item" alt="Visual Asset">
        </div>
        
        <div id="player-ui">
            <p id="now-playing">Select a track to begin:</p>
            <select id="track-selector" onchange="updateSelection()"></select>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
